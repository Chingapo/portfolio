<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="6" fill="#0B0E14"/>
  <!-- L1 teal ring — outermost, lightest -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#4FD6BE" stroke-width="1.5"/>
  <!-- L2 violet fill — mid layer -->
  <circle cx="16" cy="16" r="9.5" fill="#7C8CF8"/>
  <!-- L3 amber core — apex, signal -->
  <circle cx="16" cy="16" r="5" fill="#FFB454"/>
</svg>
