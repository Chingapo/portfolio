  <rect width="32" height="32" rx="5" fill="#0B0E14"/>
  <!-- edges -->
  <line x1="8" y1="23" x2="16" y2="13" stroke="#3B4261" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="13" x2="24" y2="7" stroke="#3B4261" stroke-width="1.5" stroke-linecap="round"/>
  <!-- L1 RAG: teal -->
  <circle cx="8" cy="23" r="4" fill="#4FD6BE"/>
  <!-- L2 Tool Use: violet -->
